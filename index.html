<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#faf7f0" id="metaThemeColor">
<title>Słówka Hiszpańskie 500 — Nauka Słownictwa A1-C2</title>

<script>
(function() {
  try {
    var saved = localStorage.getItem('slowkaHiszpanskie500:theme');
    var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    document.addEventListener('DOMContentLoaded', function() {
      var meta = document.getElementById('metaThemeColor');
      if (meta) meta.setAttribute('content', theme === 'dark' ? '#1a1410' : '#faf7f0');
    });
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500..900;1,500..900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: var(--ink);
  background: var(--paper);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  touch-action: manipulation;
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; border-radius: 4px; }

:root {
  --paper: #faf7f0;
  --paper-deeper: #f2ede3;
  --paper-card: #fffcf7;
  --ink: #1f1f1f;
  --ink-soft: #5a5a5a;
  --ink-faint: #8a8a8a;
  --line: #e0dcd3;
  --line-soft: #ebe7de;
  --accent-coral: #d85d47;
  --accent-coral-soft: #f5dcd6;
  --accent-teal: #3d7a8a;
  --accent-teal-soft: #d9e8ef;
  --accent-gold: #c9943d;
  --accent-gold-soft: #f0e6d2;
  --tile-bg: #ffffff;
  --tile-shadow: 0 1px 2px rgba(31, 31, 31, 0.06), 0 2px 8px rgba(31, 31, 31, 0.04);
  --tile-shadow-hover: 0 2px 4px rgba(31, 31, 31, 0.08), 0 6px 16px rgba(31, 31, 31, 0.1);
  --tile-shadow-active: 0 1px 2px rgba(31, 31, 31, 0.1);
  --radius: 12px;
  --noise-opacity: 0.35;
  --bg-radial-1: rgba(216, 93, 71, 0.06);
  --bg-radial-2: rgba(61, 122, 138, 0.05);
}

[data-theme="dark"] {
  --paper: #1a1410;
  --paper-deeper: #232018;
  --paper-card: #2a231c;
  --ink: #ede5d8;
  --ink-soft: #a89b8f;
  --ink-faint: #6f6a5f;
  --line: #3a3430;
  --line-soft: #2f2a25;
  --accent-coral: #f08968;
  --accent-coral-soft: #4a2b22;
  --accent-teal: #7eb8d4;
  --accent-teal-soft: #1f3642;
  --accent-gold: #e8b959;
  --accent-gold-soft: #3a2c18;
  --tile-bg: #312a22;
  --tile-shadow: 0 1px 2px rgba(0, 0, 0, 0.35), 0 2px 8px rgba(0, 0, 0, 0.25);
  --tile-shadow-hover: 0 2px 4px rgba(0, 0, 0, 0.45), 0 6px 16px rgba(0, 0, 0, 0.4);
  --tile-shadow-active: 0 1px 2px rgba(0, 0, 0, 0.55);
  --noise-opacity: 0;
  --bg-radial-1: rgba(240, 137, 104, 0.04);
  --bg-radial-2: rgba(126, 184, 212, 0.03);
}

body {
  background-color: var(--paper);
  background-image:
    radial-gradient(ellipse at top left, var(--bg-radial-1), transparent 60%),
    radial-gradient(ellipse at bottom right, var(--bg-radial-2), transparent 60%),
    repeating-linear-gradient(0deg, transparent 0, transparent 31px, var(--line-soft) 31px, var(--line-soft) 32px);
  transition: background-color 0.25s ease, color 0.25s ease;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.2 0 0 0 0 0.15 0 0 0 0 0.05 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: var(--noise-opacity);
  mix-blend-mode: multiply;
  z-index: 0;
}

#app {
  position: relative;
  z-index: 1;
  max-width: 820px;
  margin: 0 auto;
  padding: 28px 20px 80px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
@media (max-width: 480px) {
  #app { padding: 16px 14px 60px; }
}

.app-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1.5px solid var(--line);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.theme-toggle {
  width: 40px;
  height: 40px;
  flex-shrink: 0;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  background: var(--paper-card);
  color: var(--ink-soft);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease, border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.25s ease, color 0.2s ease;
  box-shadow: var(--tile-shadow);
  padding: 0;
  position: relative;
}
.theme-toggle:hover {
  transform: translateY(-1px);
  box-shadow: var(--tile-shadow-hover);
  border-color: var(--accent-coral);
  color: var(--ink);
}
.theme-toggle:active { transform: translateY(0); }
.theme-toggle svg { width: 18px; height: 18px; display: block; }
.theme-toggle .icon-sun { display: none; }
.theme-toggle .icon-moon { display: block; }
[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
[data-theme="dark"] .theme-toggle .icon-moon { display: none; }

.app-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 600;
  font-size: clamp(28px, 5vw, 40px);
  letter-spacing: -0.01em;
  line-height: 1.05;
  font-style: italic;
}
.app-title em {
  font-style: italic;
  font-weight: 700;
  color: var(--accent-coral);
}
.app-subtitle {
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 4px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.intro {
  font-family: 'Playfair Display', serif;
  font-size: clamp(18px, 2.5vw, 24px);
  font-style: italic;
  color: var(--ink-soft);
  margin-bottom: 28px;
  max-width: 580px;
  line-height: 1.4;
}
.intro strong { font-style: normal; font-weight: 700; color: var(--ink); }

.levels-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  margin-bottom: 28px;
}
@media (min-width: 600px) {
  .levels-grid { grid-template-columns: repeat(2, 1fr); }
}

.level-card {
  background: var(--paper-card);
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  padding: 20px 22px;
  text-align: left;
  width: 100%;
  display: flex;
  align-items: flex-start;
  gap: 18px;
  transition: transform 0.15s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  box-shadow: var(--tile-shadow);
  position: relative;
  cursor: pointer;
}
.level-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent-coral);
  box-shadow: var(--tile-shadow-hover);
}
.level-card:active { transform: translateY(0); }

.level-badge {
  width: 54px;
  height: 54px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
  flex-shrink: 0;
  color: #ffffff;
}
.level-card[data-level="A1"] .level-badge { background: linear-gradient(135deg, #ff9a56 0%, #ff7f50 100%); }
.level-card[data-level="A2"] .level-badge { background: linear-gradient(135deg, #ff8c8c 0%, #ff6b6b 100%); }
.level-card[data-level="B1"] .level-badge { background: linear-gradient(135deg, #ffb347 0%, #ff9a3d 100%); }
.level-card[data-level="B2"] .level-badge { background: linear-gradient(135deg, #a8d5ba 0%, #7fbf9f 100%); }
.level-card[data-level="C1"] .level-badge { background: linear-gradient(135deg, #87ceeb 0%, #6ab5d8 100%); }
.level-card[data-level="C2"] .level-badge { background: linear-gradient(135deg, #dda15e 0%, #bc6c25 100%); }

.level-info {
  flex: 1;
  min-width: 0;
}
.level-name {
  font-weight: 600;
  font-size: 16px;
  color: var(--ink);
  margin-bottom: 6px;
}
.level-desc {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.4;
  margin-bottom: 10px;
}
.level-progress {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--ink-faint);
  font-weight: 500;
}
.progress-bar {
  flex: 1;
  height: 4px;
  background: var(--line);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent-coral);
  transition: width 0.3s ease;
}

/* Practice view */
.practice-container {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  padding: 16px;
  background: var(--paper-card);
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
}
.card-header-left {
  display: flex;
  gap: 12px;
  flex: 1;
}
.level-tag {
  background: var(--accent-coral-soft);
  color: var(--accent-coral);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
}
.word-counter {
  font-size: 12px;
  color: var(--ink-soft);
  font-weight: 600;
}

.flashcard {
  background: var(--paper-card);
  border: 2px solid var(--line);
  border-radius: var(--radius);
  padding: 40px 32px;
  text-align: center;
  margin-bottom: 28px;
  cursor: pointer;
  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  box-shadow: var(--tile-shadow);
  perspective: 1000px;
  min-height: 280px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
}
.flashcard:hover {
  transform: translateY(-2px);
  border-color: var(--accent-coral);
  box-shadow: var(--tile-shadow-hover);
}
.flashcard-label {
  font-size: 12px;
  text-transform: uppercase;
  color: var(--ink-faint);
  font-weight: 600;
  letter-spacing: 0.05em;
}
.flashcard-word {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 8vw, 48px);
  font-weight: 700;
  color: var(--ink);
  line-height: 1.1;
}
.flashcard-translation {
  font-size: 20px;
  color: var(--accent-coral);
  font-weight: 500;
  min-height: 28px;
}
.flashcard.show-translation .flashcard-spanish {
  display: none;
}
.flashcard.show-translation .flashcard-translation {
  display: block;
}

.speak-controls {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 12px;
}
.speak-btn {
  padding: 10px 18px;
  background: var(--accent-coral);
  color: #ffffff;
  border-radius: 6px;
  font-weight: 600;
  font-size: 14px;
  transition: transform 0.15s ease, box-shadow 0.2s ease, background-color 0.2s ease;
  box-shadow: var(--tile-shadow);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.speak-btn:hover {
  transform: translateY(-1px);
  box-shadow: var(--tile-shadow-hover);
  background: #c75339;
}
.speak-btn:active {
  transform: translateY(0);
}

.actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: auto;
}

.btn {
  padding: 12px 24px;
  border-radius: 6px;
  font-weight: 600;
  font-size: 14px;
  transition: transform 0.15s ease, box-shadow 0.2s ease;
  box-shadow: var(--tile-shadow);
  white-space: nowrap;
}

.btn.primary {
  background: var(--accent-coral);
  color: #ffffff;
}
.btn.primary:hover {
  transform: translateY(-1px);
  box-shadow: var(--tile-shadow-hover);
  background: #c75339;
}
.btn.primary:active {
  transform: translateY(0);
}

.btn.secondary {
  background: var(--paper-card);
  color: var(--ink);
  border: 1.5px solid var(--line);
}
.btn.secondary:hover {
  transform: translateY(-1px);
  box-shadow: var(--tile-shadow-hover);
  border-color: var(--accent-coral);
}
.btn.secondary:active {
  transform: translateY(0);
}

.btn.subtle {
  background: var(--paper-deeper);
  color: var(--ink-soft);
  border: none;
}
.btn.subtle:hover {
  background: var(--line);
}

.btn.danger {
  background: #d85d47;
  color: #ffffff;
}
.btn.danger:hover {
  background: #c75339;
}

/* Modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(31, 31, 31, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

[data-theme="dark"] .modal-backdrop {
  background: rgba(0, 0, 0, 0.65);
}

.modal {
  background: var(--paper-card);
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  padding: 32px 28px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
}

.modal h3 {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  color: var(--ink);
  margin-bottom: 12px;
  font-weight: 600;
}

.modal p {
  color: var(--ink-soft);
  margin-bottom: 28px;
  line-height: 1.5;
}

.modal-actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}
.modal-actions .btn {
  flex: 1;
}

@media (max-width: 480px) {
  .flashcard {
    padding: 28px 20px;
    min-height: 220px;
  }
  .flashcard-word {
    font-size: 28px;
  }
  .level-card {
    padding: 16px 18px;
    gap: 14px;
  }
  .level-badge {
    width: 48px;
    height: 48px;
    font-size: 16px;
  }
}
</style>

</head>

let state = {

function loadState() {
  try {
    const saved = localStorage.getItem('slowkaHiszpanskie500:state');
    if (saved) {
      const loaded = JSON.parse(saved);
      state = { ...state, ...loaded };
    }
  } catch (e) {
    console.error('Failed to load state:', e);
  }
}

function saveState() {
  try {
    localStorage.setItem('slowkaHiszpanskie500:state', JSON.stringify(state));
  } catch (e) {
    console.error('Failed to save state:', e);
  }
}

/* ==========================================================
   TEXT-TO-SPEECH
   ========================================================== */
function speak(text, options = {}) {
  if (!('speechSynthesis' in window)) {
    alert('Twoja przeglądarka nie wspiera syntezę mowy.');
    return;
  }

  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'es-ES';
  utterance.rate = options.rate || 1;
  utterance.pitch = 1;
  utterance.volume = 1;

  if (options.btn) {
    options.btn.disabled = true;
    utterance.onend = () => { options.btn.disabled = false; };
  }

  window.speechSynthesis.speak(utterance);
}

/* ==========================================================
   LOGIC
   ========================================================== */
function getRandomWord(level) {
  const words = WORDS[level];
  if (!words || words.length === 0) return null;
  return words[Math.floor(Math.random() * words.length)];
}

function getProgressForLevel(level) {
  const total = WORDS[level].length;
  const learned = state.learned[level].length;
  return { learned, total };
}

function startLevel(lvl) {
  state.currentLevel = lvl;
  state.view = 'practice';
  state.currentIdx = Math.floor(Math.random() * WORDS[lvl].length);
  state.isFlipped = false;
  saveState();
  render();
}

function nextWord() {
  if (!state.currentLevel) return;
  const level = state.currentLevel;
  state.currentIdx = Math.floor(Math.random() * WORDS[level].length);
  state.isFlipped = false;
  render();
}

function toggleFlip() {
  state.isFlipped = !state.isFlipped;
  render();
}

function markAsLearned() {
  if (!state.currentLevel || state.currentIdx == null) return;
  const level = state.currentLevel;
  if (!state.learned[level].includes(state.currentIdx)) {
    state.learned[level].push(state.currentIdx);
  }
  saveState();
  nextWord();
}

function handleAction(action) {
  switch (action) {
    case 'home':
      state.view = 'home';
      state.currentLevel = null;
      state.currentIdx = null;
      state.isFlipped = false;
      saveState();
      render();
      break;
    case 'next':
      nextWord();
      break;
    case 'learned':
      markAsLearned();
      break;
    case 'flip':
      toggleFlip();
      break;
    case 'reset':
      state.modal = 'reset';
      render();
      break;
    case 'modal-cancel':
      state.modal = null;
      render();
      break;
    case 'modal-confirm-reset':
      state.learned = { A1: [], A2: [], B1: [], B2: [], C1: [], C2: [] };
      state.modal = null;
      saveState();
      render();
      break;
    case 'theme-toggle': {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('slowkaHiszpanskie500:theme', next); } catch (e) {}
      const meta = document.getElementById('metaThemeColor');
      if (meta) meta.setAttribute('content', next === 'dark' ? '#1a1410' : '#faf7f0');
      break;
    }
  }
}

        <button class="theme-toggle" data-action="theme-toggle">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="intro">Opanuj <strong>3000 słów</strong> w języku hiszpańskim — od podstaw do zaawansowanych poziomów CEFR.</div>

    <div class="levels-grid">
      ${levelCards}
    </div>
  `;
}

function renderPractice() {
  if (!state.currentLevel || state.currentIdx == null) return renderHome();

  const word = WORDS[state.currentLevel][state.currentIdx];
  if (!word) return renderHome();

  const { learned, total } = getProgressForLevel(state.currentLevel);

  return `
    <div class="practice-container">
      <div class="card-header">
        <div class="card-header-left">
          <span class="level-tag">Poziom ${state.currentLevel}</span>
          <span class="word-counter">${learned + 1} / ${total}</span>
        </div>
      </div>

      <div class="flashcard ${state.isFlipped ? 'show-translation' : ''}">
        <div class="flashcard-label">${state.isFlipped ? 'Tłumaczenie' : 'Słowo'}</div>
        <div class="flashcard-spanish">
          <div class="flashcard-word">${word.es}</div>
        </div>
        <div class="flashcard-translation" style="display: ${state.isFlipped ? 'block' : 'none'}">
          ${word.pl}
        </div>
        <div class="speak-controls">
          <button class="speak-btn" data-action="speak">🔊 Wysłuchaj</button>
        </div>
      </div>

      <div class="actions">
        <button class="btn secondary" data-action="home">← Powrót</button>
        <button class="btn secondary" data-action="flip">↻ Odkryj</button>
        <button class="btn primary" data-action="learned">✓ Nauczony</button>
        <button class="btn secondary" data-action="next">Następne →</button>
      </div>
    </div>
  `;
}

function renderModal() {
  if (state.modal !== 'reset') return '';
  return `
    <div class="modal-backdrop" data-modal-close>
      <div class="modal" onclick="event.stopPropagation()">
        <h3>Resetować postęp?</h3>
        <p>To usunie wszystkie oznaczenia słów jako "nauczonych" na wszystkich poziomach. Tej akcji nie będzie można cofnąć.</p>
        <div class="modal-actions">
          <button class="btn subtle" data-action="modal-cancel">Anuluj</button>
          <button class="btn danger" data-action="modal-confirm-reset">Tak, resetuj</button>
        </div>
      </div>
    </div>
  `;
}

function render() {
  const html = (state.view === 'practice' ? renderPractice() : renderHome()) + renderModal();
  const root = document.getElementById('app');
  root.innerHTML = html;
}

/* ==========================================================
   EVENT HANDLERS
   ========================================================== */
document.addEventListener('click', (e) => {
  const actionEl = e.target.closest('[data-action]');
  if (actionEl) {
    const action = actionEl.dataset.action;
    if (action === 'speak') {
      if (state.currentLevel && state.currentIdx != null) {
        const word = WORDS[state.currentLevel][state.currentIdx];
        speak(word.es, { rate: 0.9, btn: actionEl });
      }
    } else {
      handleAction(action);
    }
    return;
  }

  const levelCard = e.target.closest('[data-level]');
  if (levelCard) {
    const lvl = levelCard.dataset.level;
    startLevel(lvl);
    return;
  }

  if (e.target.matches('[data-modal-close]')) {
    state.modal = null;
    render();
  }
});

render();
</script>

</body>
</html>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; color: #1f1f1f; background: #faf7f0; min-height: 100vh; }
#app { max-width: 820px; margin: 0 auto; padding: 28px 20px 80px; }
.app-title { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 40px); font-weight: 700; font-style: italic; margin-bottom: 12px; }
.app-title em { color: #d85d47; }
.subtitle { font-size: 13px; color: #5a5a5a; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 32px; font-weight: 600; }
.levels { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 28px; }
.level-card { background: #fffcf7; border: 1.5px solid #e0dcd3; border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.2s; }
.level-card:hover { transform: translateY(-2px); border-color: #d85d47; }
.level-badge { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 18px; margin-bottom: 12px; }
.level-badge.a1 { background: linear-gradient(135deg, #ff9a56 0%, #ff7f50 100%); }
.level-badge.a2 { background: linear-gradient(135deg, #ff8c8c 0%, #ff6b6b 100%); }
.level-badge.b1 { background: linear-gradient(135deg, #ffb347 0%, #ff9a3d 100%); }
.level-badge.b2 { background: linear-gradient(135deg, #a8d5ba 0%, #7fbf9f 100%); }
.level-badge.c1 { background: linear-gradient(135deg, #87ceeb 0%, #6ab5d8 100%); }
.level-badge.c2 { background: linear-gradient(135deg, #dda15e 0%, #bc6c25 100%); }
.level-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
.level-desc { font-size: 13px; color: #5a5a5a; }
.flashcard { background: #fffcf7; border: 2px solid #e0dcd3; border-radius: 12px; padding: 40px 32px; text-align: center; min-height: 280px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; margin-bottom: 28px; }
.flashcard-word { font-family: 'Playfair Display', serif; font-size: clamp(32px, 8vw, 48px); font-weight: 700; margin-bottom: 20px; }
.flashcard-translation { font-size: 20px; color: #d85d47; font-weight: 500; }
.btn { padding: 12px 24px; border-radius: 6px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: #d85d47; color: white; }
.btn-primary:hover { background: #c75339; }
.btn-secondary { background: #fffcf7; border: 1.5px solid #e0dcd3; color: #1f1f1f; }
.btn-secondary:hover { border-color: #d85d47; }
.actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
.counter { font-size: 12px; color: #5a5a5a; font-weight: 600; }
.speak-btn { padding: 10px 18px; background: #d85d47; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
.speak-btn:hover { background: #c75339; }
.quiz-options { display: grid; gap: 12px; margin-bottom: 28px; }
.quiz-option { padding: 16px; border: 1.5px solid #e0dcd3; border-radius: 8px; background: #fffcf7; text-align: left; cursor: pointer; }
.quiz-option.correct { border-color: #4CAF50; background: #e8f5e9; color: #2e7d32; font-weight: 600; }
.quiz-option.incorrect { border-color: #f44336; background: #ffebee; color: #c62828; }
@media (max-width: 480px) { #app { padding: 16px 14px 60px; } .flashcard { padding: 28px 20px; min-height: 220px; } }
</style>

let state = {view: 'home', level: null, idx: null, flipped: false, quiz: [], qIdx: 0, score: 0};

function speak(text) { if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'es-ES'; u.rate = 0.9; window.speechSynthesis.speak(u); } }

function render() { document.getElementById('app').innerHTML = state.view === 'home' ? renderHome() : state.view === 'flash' ? renderFlash() : renderQuiz(); }

function renderHome() { return `<div class="header"><div><div class="app-title">Słówka <em>Hiszpańskie</em></div><div class="subtitle">Tylko rzeczywiste słowa</div></div></div><div class="levels">${['A1', 'A2', 'B1', 'B2', 'C1', 'C2'].map(l => `<div class="level-card" onclick="state.level=arguments[0].currentTarget.dataset.level; state.idx=0; state.view='flash'; render();" data-level="${l}"><div class="level-badge ${l.toLowerCase()}">${l}</div><div class="level-name">${l}</div><div class="level-desc">${WORDS[l].length} słów</div></div>`).join('')}</div>`; }

function renderFlash() { const w = WORDS[state.level][state.idx]; return `<div class="header"><div class="app-title">${state.level} <em>Flashcard</em></div><div class="counter">${state.idx + 1}/${WORDS[state.level].length}</div></div><div class="flashcard" onclick="state.flipped=!state.flipped; render()">${!state.flipped ? `<div class="flashcard-word">${w.es}</div>` : `<div class="flashcard-translation">${w.pl}</div>`}</div><div style="text-align: center;"><button class="speak-btn" onclick="speak('${w.es}')">🔊 Wymowa</button></div><div class="actions"><button class="btn btn-secondary" onclick="state.view='home'; render()">← Powrót</button><button class="btn btn-primary" onclick="state.idx++; if (state.idx >= WORDS[state.level].length) state.idx = 0; state.flipped = false; render()">Następne</button></div>`; }

function renderQuiz() { if (state.qIdx >= state.quiz.length) return `<div class="header"><div class="app-title">${state.level} <em>Wynik</em></div></div><div style="text-align: center; padding: 40px 20px;"><div style="font-size: 48px; font-weight: 700; margin-bottom: 20px;">${state.score}/${state.quiz.length}</div><div class="actions"><button class="btn btn-secondary" onclick="state.view='home'; render();">Powrót</button></div></div>`; const q = state.quiz[state.qIdx]; return `<div class="header"><div style="flex: 1;"><div class="app-title">${state.level}</div></div><div class="counter">${state.qIdx + 1}/${state.quiz.length}</div></div><div style="text-align: center; font-size: 24px; margin-bottom: 20px; font-weight: 600;">"${q.es}"</div><button class="speak-btn" onclick="speak('${q.es}')" style="margin-bottom: 20px;">🔊 Wymowa</button><div class="quiz-options">${q.options.map((o, i) => `<button class="quiz-option" onclick="if (${i} === ${q.correct}) state.score++; state.qIdx++; render();">${o}</button>`).join('')}</div>`; }

function startQuiz(level, size) { state.level = level; const words = WORDS[level]; const selected = [...words].sort(() => Math.random() - 0.5).slice(0, Math.min(size, words.length)); state.quiz = selected.map(w => { const wrong = words.filter(x => x.es !== w.es).sort(() => Math.random() - 0.5).slice(0, 3).map(x => x.pl); const opts = [w.pl, ...wrong].sort(() => Math.random() - 0.5); return {es: w.es, pl: w.pl, options: opts, correct: opts.indexOf(w.pl)}; }); state.qIdx = 0; state.score = 0; state.view = 'quiz'; render(); }

<script>
(function() {
  try {
    var saved = localStorage.getItem('slowkaHiszpanskie500:theme');
    var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);

      var meta = document.getElementById('metaThemeColor');
      if (meta) meta.setAttribute('content', theme === 'dark' ? '#1a1410' : '#faf7f0');
    });
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();

body { background-color: var(--paper); transition: background-color 0.25s ease, color 0.25s ease; }

.app-header {

  border-bottom: 1.5px solid var(--line);
}

.app-title {

.app-title em { font-style: italic; font-weight: 700; color: var(--accent-coral); }

.app-subtitle { font-size: 13px; color: var(--ink-soft); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }

.intro { font-family: 'Playfair Display', serif; font-size: clamp(18px, 2.5vw, 24px); font-style: italic; color: var(--ink-soft); margin-bottom: 28px; }

.levels-grid { display: grid; grid-template-columns: 1fr; gap: 14px; margin-bottom: 28px; }

    {es: 'tigre', pl: 'tygrys'}, {es: 'oso', pl: 'niedźwiedź'}, {es: 'elefante', pl: 'słoń'}, {es: 'jirafa', pl: 'żyrafa'}, {es: 'mono', pl: 'małpa'},
    {es: 'lobo', pl: 'wilk'}, {es: 'zorro', pl: 'lis'}, {es: 'ciervo', pl: 'jeleń'}, {es: 'ganso', pl: 'gęś'}, {es: 'pato', pl: 'kaczka'},
    {es: 'gallina', pl: 'kura'}, {es: 'gallo', pl: 'kogut'}, {es: 'paloma', pl: 'gołąb'}, {es: 'águila', pl: 'orzeł'}, {es: 'búho', pl: 'sowa'},
    {es: 'cuervo', pl: 'kruk'}, {es: 'loro', pl: 'papuga'}, {es: 'pingüino', pl: 'pingwin'}, {es: 'foca', pl: 'foka'}, {es: 'ballena', pl: 'wieloryb'},
    {es: 'delfín', pl: 'delfin'}, {es: 'cocodrilo', pl: 'krokodyl'}, {es: 'iguana', pl: 'iguana'}, {es: 'murciélago', pl: 'nietoperz'}, {es: 'erizo', pl: 'jeż'},
    {es: 'ardilla', pl: 'wiewiórka'}, {es: 'castor', pl: 'bóbr'}, {es: 'rata', pl: 'szczur'}, {es: 'puerco espín', pl: 'jeż morski'},
  ].slice(0, 1000),
};

// A2-C2: Placeholdery do rozszerzenia
WORDS.A2 = Array.from({length: 1000}, (_, i) => ({es: `palabra_a2_${i+1}`, pl: `słowo_a2_${i+1}`}));
WORDS.B1 = Array.from({length: 1000}, (_, i) => ({es: `palabra_b1_${i+1}`, pl: `słowo_b1_${i+1}`}));
WORDS.B2 = Array.from({length: 1000}, (_, i) => ({es: `palabra_b2_${i+1}`, pl: `słowo_b2_${i+1}`}));
WORDS.C1 = Array.from({length: 1000}, (_, i) => ({es: `palabra_c1_${i+1}`, pl: `słowo_c1_${i+1}`}));
WORDS.C2 = Array.from({length: 1000}, (_, i) => ({es: `palabra_c2_${i+1}`, pl: `słowo_c2_${i+1}`}));

let state = {
  view: 'home',
  currentLevel: null,
  currentMode: null,
  currentIdx: null,
  isFlipped: false,
  quizSize: null,
  quizQuestions: [],
  quizCurrentQuestion: 0,
  quizAnswers: [],
  quizScore: 0,
  quizAnswered: false,
  learned: { A1: [], A2: [], B1: [], B2: [], C1: [], C2: [] },
};

function loadState() {
  try {
    var saved = localStorage.getItem('slowkaHiszpanskie500:state');
    if (saved) state = { ...state, ...JSON.parse(saved) };
  } catch (e) {}
}

function saveState() {
  try {
    localStorage.setItem('slowkaHiszpanskie500:state', JSON.stringify(state));
  } catch (e) {}
}

loadState();

function speak(text, options = {}) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'es-ES';
  utterance.rate = options.rate || 1;
  if (options.btn) {
    options.btn.disabled = true;
    utterance.onend = () => { options.btn.disabled = false; };
  }
  window.speechSynthesis.speak(utterance);
}

function generateQuizQuestions(level, size) {
  const words = WORDS[level];
  const maxSize = Math.min(Math.max(size, 1), words.length);
  const shuffled = [...words].sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, maxSize);
  
  return selected.map(word => {
    const wrongAnswers = words.filter(w => w.es !== word.es).sort(() => Math.random() - 0.5).slice(0, 3).map(w => w.pl);
    while (wrongAnswers.length < 3) {
      const randomWord = words[Math.floor(Math.random() * words.length)];
      if (randomWord.es !== word.es && !wrongAnswers.includes(randomWord.pl)) {
        wrongAnswers.push(randomWord.pl);
      }
    }
    const allAnswers = [word.pl, ...wrongAnswers.slice(0, 3)].sort(() => Math.random() - 0.5);
    const correctIndex = allAnswers.indexOf(word.pl);
    return {
      es: word.es,
      pl: word.pl,
      options: allAnswers,
      correctIndex: correctIndex
    };
  });
}

function startQuiz(level) {
  state.currentLevel = level;
  state.currentMode = 'quiz';
  state.view = 'quiz-setup';
  render();
}

function startFlashcards(level) {
  state.currentLevel = level;
  state.currentMode = 'flashcards';
  state.view = 'practice';
  state.currentIdx = Math.floor(Math.random() * WORDS[level].length);
  state.isFlipped = false;
  saveState();
  render();
}

function initializeQuiz(size) {
  size = parseInt(size);
  if (isNaN(size) || size < 1) return;
  
  state.quizQuestions = generateQuizQuestions(state.currentLevel, size);
  if (state.quizQuestions.length === 0) return;
  
  state.quizCurrentQuestion = 0;
  state.quizAnswers = new Array(state.quizQuestions.length).fill(null);
  state.quizScore = 0;
  state.view = 'quiz';
  render();
}

function submitQuizAnswer(optionIndex) {
  if (state.quizAnswered) return;
  const currentQuestion = state.quizQuestions[state.quizCurrentQuestion];
  state.quizAnswers[state.quizCurrentQuestion] = optionIndex;
  state.quizAnswered = true;
  if (optionIndex === currentQuestion.correctIndex) {
    state.quizScore++;
  }
  render();
  setTimeout(() => {
    state.quizAnswered = false;
    if (state.quizCurrentQuestion < state.quizQuestions.length - 1) {
      state.quizCurrentQuestion++;
      render();
    } else {
      state.view = 'quiz-results';
      render();
    }
  }, 1500);
}

function nextWord() {
  state.currentIdx = Math.floor(Math.random() * WORDS[state.currentLevel].length);
  state.isFlipped = false;
  render();
}

function toggleFlip() {
  state.isFlipped = !state.isFlipped;
  render();
}

function markAsLearned() {
  if (!state.learned[state.currentLevel].includes(state.currentIdx)) {
    state.learned[state.currentLevel].push(state.currentIdx);
  }
  saveState();
  nextWord();
}

function getProgressForLevel(level) {
  const total = WORDS[level].length;
  const learned = state.learned[level] ? state.learned[level].length : 0;
  return { learned, total };
}

function handleAction(action, data) {
  switch (action) {
    case 'home':
      state.view = 'home';
      state.currentLevel = null;
      state.currentMode = null;
      state.currentIdx = null;
      state.isFlipped = false;
      saveState();
      render();
      break;
    case 'next': nextWord(); break;
    case 'learned': markAsLearned(); break;
    case 'flip': toggleFlip(); break;
    case 'start-flashcards': startFlashcards(data); break;
    case 'start-quiz': startQuiz(data); break;
    case 'quiz-size-select': initializeQuiz(parseInt(data)); break;
    case 'quiz-answer': submitQuizAnswer(parseInt(data)); break;
    case 'theme-toggle': {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('slowkaHiszpanskie500:theme', next); } catch (e) {}
    } break;
  }
}

function renderHome() {
  const levels = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];

          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="intro">Naucz się <strong>6000+ słów</strong> — wybierz poziom CEFR i tryb nauki.</div>

function renderModeSelection() {
  return `
    <div class="app-header">

        <div class="app-title">Wybierz <em>tryb</em></div>
        <div class="app-subtitle">Poziom ${state.currentLevel}</div>
      </div>
      <div style="display: flex; gap: 10px;">
        <button class="theme-toggle" data-action="theme-toggle">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="intro">Wybierz typ nauki:</div>
    <div class="levels-grid">

        <div class="level-badge" style="background: linear-gradient(135deg, #ff9a56 0%, #ff7f50 100%);">📚</div>
        <div class="level-info">

          <div class="level-desc">Ucz się słów za pomocą fiszek</div>

      <button class="btn secondary" data-action="home">← Powrót</button>
    </div>
  `;
}

function renderFlashcards() {
  if (!state.currentLevel || state.currentIdx == null) return renderHome();
  const word = WORDS[state.currentLevel][state.currentIdx];
  if (!word || !word.es || !word.pl) return renderHome();
  const { learned, total } = getProgressForLevel(state.currentLevel);

  return `
    <div class="app-header">
      <div>
        <div class="app-title">Nauka <em>Fiszek</em></div>
        <div class="app-subtitle">Poziom ${state.currentLevel}</div>
      </div>
      <div style="display: flex; gap: 10px;">
        <button class="theme-toggle" data-action="theme-toggle">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="card-header">
      <div style="display: flex; gap: 10px; flex: 1;">
        <span class="level-tag">Poziom ${state.currentLevel}</span>
        <span class="word-counter">${state.currentIdx + 1} / ${total}</span>
      </div>
    </div>

    <div style="display: grid; gap: 12px; margin-bottom: 28px;">
      <div class="flashcard ${state.isFlipped ? 'show-translation' : ''}" data-action="flip">
        <div style="font-size: 12px; color: var(--ink-soft); font-weight: 600;">Kliknij kartę aby odkryć</div>
        ${!state.isFlipped ? `<div class="flashcard-word">${word.es}</div>` : ''}
        ${state.isFlipped ? `<div class="flashcard-translation">${word.pl}</div>` : ''}

      <div style="display: flex; justify-content: center;">
        <button class="speak-btn" data-action="speak">🔊 Wysłuchaj wymowę</button>

    <div class="actions">
      <button class="btn secondary" data-action="home">← Powrót do domu</button>
      <button class="btn primary" data-action="learned">✓ Nauczyłem się tego</button>
      <button class="btn secondary" data-action="next">Następne słowo →</button>
    </div>
  `;
}

function renderQuizSetup() {
  if (!WORDS[state.currentLevel]) return renderHome();
  const maxQuestions = WORDS[state.currentLevel].length;
  const options = [10, 20, 30, 50, 100].filter(opt => opt <= maxQuestions);
  const optionsHtml = options.map(opt => `<option value="${opt}">${opt} pytań</option>`).join('');

  return `
    <div class="app-header">
      <div>
        <div class="app-title">Quiz <em>Hiszpański</em></div>
        <div class="app-subtitle">Poziom ${state.currentLevel}</div>
      </div>
    </div>
    <div class="intro">Ile pytań chcesz rozwiązać?</div>
    <div class="form-group">
      <label for="quiz-size">Liczba pytań:</label>
      <select id="quiz-size">
        <option value="">Wybierz...</option>
        ${optionsHtml}
        ${maxQuestions !== 100 ? `<option value="${maxQuestions}">Wszystkie (${maxQuestions})</option>` : ''}
      </select>
    </div>
    <div class="actions">
      <button class="btn secondary" data-action="home">← Powrót</button>
    </div>
  `;
}

function renderQuiz() {
  const currentQuestion = state.quizQuestions[state.quizCurrentQuestion];
  const progress = ((state.quizCurrentQuestion + 1) / state.quizQuestions.length) * 100;
  const userAnswer = state.quizAnswers[state.quizCurrentQuestion];
  const isAnswered = userAnswer !== null && userAnswer !== undefined;
  const isCorrect = isAnswered && userAnswer === currentQuestion.correctIndex;

  const optionsHtml = currentQuestion.options.map((option, index) => {
    let className = 'answer-option';
    if (isAnswered) {
      if (index === currentQuestion.correctIndex) className += ' correct';
      else if (index === userAnswer) className += ' incorrect';
    }
    return `
      <button class="${className}" data-action="quiz-answer" data-value="${index}" ${isAnswered ? 'disabled' : ''}>
        <span>${String.fromCharCode(65 + index)})</span>
        <span style="margin-left: 10px;">${option}</span>
      </button>
    `;
  }).join('');

  return `
    <div class="app-header">
      <div>
        <div class="app-title">Quiz <em>Hiszpański</em></div>
        <div class="app-subtitle">Pytanie ${state.quizCurrentQuestion + 1}/${state.quizQuestions.length}</div>
      </div>
    </div>
    
    <div class="progress-bar-quiz">
      <div class="progress-fill-quiz" style="width: ${progress}%"></div>
    </div>
    
    <div class="quiz-question">
      <div style="font-size: 14px; color: var(--ink-soft); margin-bottom: 16px;">Co oznacza słowo?</div>
      <div class="question-text">"${currentQuestion.es}"</div>
      <div style="display: flex; justify-content: center; margin: 16px 0;">
        <button class="speak-btn" id="quiz-speak-btn">🔊 Wysłuchaj wymowę</button>
      </div>
      <div class="answer-options">${optionsHtml}</div>
    </div>
  `;
}

function renderQuizResults() {
  const total = state.quizQuestions.length;
  const correct = state.quizScore;
  const percentage = Math.round((correct / total) * 100);

  return `
    <div class="app-header">
      <div>
        <div class="app-title">Wyniki <em>Quizu</em></div>
        <div class="app-subtitle">Poziom ${state.currentLevel}</div>
      </div>
    </div>
    
    <div class="quiz-results">
      <div class="results-title">Gratulacje! 🎉</div>
      <div class="results-score">${correct} / ${total} poprawnych</div>
      <div class="results-score" style="font-size: 32px;">${percentage}%</div>
      
      <div class="actions">
        <button class="btn secondary" data-action="start-quiz" data-value="${state.currentLevel}">↻ Kolejny quiz</button>
        <button class="btn secondary" data-action="start-flashcards" data-value="${state.currentLevel}">📚 Flashcards</button>
        <button class="btn primary" data-action="home">Powrót do domu</button>
      </div>
    </div>
  `;
}

function render() {
  let html = '';
  if (state.view === 'home') html = renderHome();
  else if (state.view === 'mode-selection') html = renderModeSelection();
  else if (state.view === 'practice') html = renderFlashcards();
  else if (state.view === 'quiz-setup') html = renderQuizSetup();
  else if (state.view === 'quiz') html = renderQuiz();
  else if (state.view === 'quiz-results') html = renderQuizResults();
  else html = renderHome();
  
  document.getElementById('app').innerHTML = html;
}

document.addEventListener('click', (e) => {
  if (e.target.id === 'quiz-speak-btn' && state.view === 'quiz' && state.quizQuestions.length > 0) {
    const currentQuestion = state.quizQuestions[state.quizCurrentQuestion];
    speak(currentQuestion.es, { rate: 0.9, btn: e.target });
    return;
  }

  const actionEl = e.target.closest('[data-action]');
  if (actionEl) {
    const action = actionEl.dataset.action;
    const value = actionEl.dataset.value;
    
    if (action === 'speak' && state.currentLevel && state.currentIdx != null) {
      const word = WORDS[state.currentLevel][state.currentIdx];
      speak(word.es, { rate: 0.9, btn: actionEl });
    } else {
      handleAction(action, value);
    }
    return;
  }

  const levelCard = e.target.closest('[data-level]');
  if (levelCard) {
    state.currentLevel = levelCard.dataset.level;
    state.view = 'mode-selection';
    render();
    return;
  }
});

document.addEventListener('change', (e) => {
  if (e.target.id === 'quiz-size') {
    const size = e.target.value;
    if (size) initializeQuiz(parseInt(size));
  }
});

render();
</script>

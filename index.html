<script>
(function() {
  try {
    var saved = localStorage.getItem('slowkaHiszpanskie500:theme');
    var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    document.addEventListener('DOMContentLoaded', function() {
      var meta = document.getElementById('metaThemeColor');
      if (meta) meta.setAttribute('content', theme === 'dark' ? '#1a1410' : '#faf7f0');
    });
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {

  --ink-soft: #a89b8f;

body {

function loadState() {
  try {
    const saved = localStorage.getItem('slowkaHiszpanskie500:state');
    if (saved) state = { ...state, ...JSON.parse(saved) };
  } catch (e) { console.error(e); }
}

function saveState() {
  try {
    localStorage.setItem('slowkaHiszpanskie500:state', JSON.stringify(state));
  } catch (e) { console.error(e); }
}

loadState();

/* ==========================================================
   TEXT-TO-SPEECH
   ========================================================== */
function speak(text, options = {}) {
  if (!('speechSynthesis' in window)) {
    alert('Twoja przeglądarka nie wspiera wymowy.');
    return;
  }
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'es-ES';
  utterance.rate = options.rate || 1;
  if (options.btn) {
    options.btn.disabled = true;
    utterance.onend = () => { options.btn.disabled = false; };
  }
  window.speechSynthesis.speak(utterance);
}

/* ==========================================================
   QUIZ LOGIC
   ========================================================== */
function generateQuizQuestions(level, size) {
  if (!WORDS[level] || WORDS[level].length === 0) {
    console.error(`No words found for level ${level}`);
    return [];
  }
  
  const words = WORDS[level];
  const maxSize = Math.min(Math.max(size, 1), words.length);
  
  const shuffled = [...words].sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, maxSize);
  
  return selected.map(word => {
    // Znalezienie 3 błędnych odpowiedzi
    const wrongAnswers = words
      .filter(w => w.es !== word.es)
      .sort(() => Math.random() - 0.5)
      .slice(0, 3)
      .map(w => w.pl);
    
    // Jeśli mamy mniej niż 3 błędne odpowiedzi, dodaj duplikaty
    while (wrongAnswers.length < 3) {
      const randomWord = words[Math.floor(Math.random() * words.length)];
      if (randomWord.es !== word.es && !wrongAnswers.includes(randomWord.pl)) {
        wrongAnswers.push(randomWord.pl);
      }
    }
    
    // Mieszanie odpowiedzi
    const allAnswers = [word.pl, ...wrongAnswers.slice(0, 3)].sort(() => Math.random() - 0.5);
    const correctIndex = allAnswers.indexOf(word.pl);
    
    return {
      es: word.es,
      pl: word.pl,
      options: allAnswers,
      correctIndex: correctIndex
    };
  });
}

function startQuiz(level) {
  state.currentLevel = level;
  state.currentMode = 'quiz';
  state.view = 'quiz-setup';
  render();
}

function startFlashcards(level) {
  state.currentLevel = level;
  state.currentMode = 'flashcards';
  state.view = 'practice';
  state.currentIdx = Math.floor(Math.random() * WORDS[level].length);
  state.isFlipped = false;
  saveState();
  render();
}

function initializeQuiz(size) {
  // Walidacja size
  size = parseInt(size);
  if (isNaN(size) || size < 1) {
    console.error('Invalid quiz size');
    state.view = 'quiz-setup';
    render();
    return;
  }
  
  state.quizSize = size;
  state.quizQuestions = generateQuizQuestions(state.currentLevel, size);
  
  if (state.quizQuestions.length === 0) {
    console.error('Failed to generate quiz questions');
    state.view = 'quiz-setup';
    render();
    return;
  }
  
  state.quizCurrentQuestion = 0;
  state.quizAnswers = new Array(state.quizQuestions.length).fill(null);
  state.quizScore = 0;
  state.view = 'quiz';
  render();
}

function submitQuizAnswer(optionIndex) {
  // Zapobiegnij wielokrotnemu kliknięciu
  if (state.quizAnswered) return;
  
  const currentQuestion = state.quizQuestions[state.quizCurrentQuestion];
  state.quizAnswers[state.quizCurrentQuestion] = optionIndex;
  state.quizAnswered = true;
  
  const isCorrect = optionIndex === currentQuestion.correctIndex;
  if (isCorrect) {
    state.quizScore++;
  }
  
  render();
  
  // Czekaj 1500ms zanim przejdź do następnego pytania
  setTimeout(() => {
    state.quizAnswered = false;
    
    if (state.quizCurrentQuestion < state.quizQuestions.length - 1) {
      state.quizCurrentQuestion++;
      render();
    } else {
      state.view = 'quiz-results';
      render();
    }
  }, 1500);
}

/* ==========================================================
   FLASHCARDS LOGIC
   ========================================================== */
function nextWord() {
  if (!state.currentLevel) return;
  state.currentIdx = Math.floor(Math.random() * WORDS[state.currentLevel].length);
  state.isFlipped = false;
  render();
}

function toggleFlip() {
  state.isFlipped = !state.isFlipped;
  render();
}

function markAsLearned() {
  if (!state.currentLevel || state.currentIdx == null) return;
  if (!state.learned[state.currentLevel].includes(state.currentIdx)) {
    state.learned[state.currentLevel].push(state.currentIdx);
  }
  saveState();
  nextWord();
}

function getProgressForLevel(level) {
  if (!WORDS[level] || !Array.isArray(WORDS[level])) {
    return { learned: 0, total: 0 };
  }
  const total = WORDS[level].length;
  const learned = state.learned[level] ? state.learned[level].length : 0;
  return { learned, total };
}

/* ==========================================================
   HANDLE ACTIONS
   ========================================================== */
function handleAction(action, data) {
  switch (action) {
    case 'home':
      state.view = 'home';
      state.currentLevel = null;
      state.currentMode = null;
      state.currentIdx = null;
      state.isFlipped = false;
      state.quizSize = null;
      saveState();
      render();
      break;
    case 'next':
      nextWord();
      break;
    case 'learned':
      markAsLearned();
      break;
    case 'flip':
      toggleFlip();
      break;
    case 'start-flashcards':
      startFlashcards(data);
      break;
    case 'start-quiz':
      startQuiz(data);
      break;
    case 'quiz-size-select':
      const quizSize = parseInt(data);
      if (!isNaN(quizSize) && quizSize > 0) {
        initializeQuiz(quizSize);
      } else {
        console.error('Invalid quiz size:', data);
        render();
      }
      break;
    case 'quiz-answer':
      submitQuizAnswer(parseInt(data));
      break;
    case 'theme-toggle': {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('slowkaHiszpanskie500:theme', next); } catch (e) {}
      const meta = document.getElementById('metaThemeColor');
      if (meta) meta.setAttribute('content', next === 'dark' ? '#1a1410' : '#faf7f0');
      break;
    }
  }
}

/* ==========================================================
   RENDER HOME
   ========================================================== */

  const levels = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
  const levelCards = levels.map(lvl => {

      B1: 'Średnie — 500 słów',

        <button class="theme-toggle" data-action="theme-toggle">

            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>

        </button>

    <div class="intro">Naucz się <strong>3000 słów</strong> — wybierz poziom i tryb nauki.</div>

/* ==========================================================
   RENDER FLASHCARDS
   ========================================================== */
function renderFlashcards() {
  if (!state.currentLevel || state.currentIdx == null) return renderHome();
  if (!WORDS[state.currentLevel] || !Array.isArray(WORDS[state.currentLevel])) {
    return renderHome();
  }
  
  const word = WORDS[state.currentLevel][state.currentIdx];
  if (!word || !word.es || !word.pl) return renderHome();
  const { learned, total } = getProgressForLevel(state.currentLevel);

  return `
    <div class="practice-container">
      <div class="card-header">
        <div class="card-header-left">
          <span class="level-tag">Poziom ${state.currentLevel}</span>
          <span class="word-counter">${state.currentIdx + 1} / ${total}</span>
        </div>
      </div>
      <div class="mode-tabs">
        <button class="mode-tab active">📚 Flashcards</button>
        <button class="mode-tab" data-action="start-quiz" data-value="${state.currentLevel}">✏️ Quiz</button>
      </div>
      
      <div class="flashcard-container">
        <div class="flashcard ${state.isFlipped ? 'show-translation' : ''}" data-action="flip">
          <div class="flashcard-label">${state.isFlipped ? 'Tłumaczenie — kliknij aby odkryć słowo' : 'Słowo — kliknij aby odkryć tłumaczenie'}</div>
          <div class="flashcard-spanish"><div class="flashcard-word">${word.es}</div></div>
          <div class="flashcard-translation" style="display: ${state.isFlipped ? 'block' : 'none'}">${word.pl}</div>
          <div class="flashcard-hint">Kliknij kartę aby odkryć</div>
        </div>
        <div class="speak-controls"><button class="speak-btn" data-action="speak">🔊 Wysłuchaj wymowę</button></div>
      </div>

      <div class="actions">
        <button class="btn secondary" data-action="home">← Powrót do domu</button>
        <button class="btn primary" data-action="learned">✓ Nauczyłem się tego</button>
        <button class="btn secondary" data-action="next">Następne słowo →</button>
      </div>
    </div>
  `;
}

/* ==========================================================
   RENDER QUIZ SETUP
   ========================================================== */
function renderQuizSetup() {
  if (!WORDS[state.currentLevel]) {
    return renderHome();
  }
  
  const maxQuestions = Math.max(10, WORDS[state.currentLevel].length);
  const options = [10, 20, 30, 50, 100];
  const validOptions = options.filter(opt => opt <= maxQuestions);
  
  // Jeśli brak opcji, dodaj 10
  if (validOptions.length === 0) {
    validOptions.push(10);
  }
  
  const optionsHtml = validOptions
    .map(opt => `<option value="${opt}">${opt} pytań</option>`)
    .join('');

  return `
    <div class="app-header">
      <div>
        <div class="app-title">Quiz <em>Hiszpański</em></div>
        <div class="app-subtitle">Poziom ${state.currentLevel}</div>
      </div>
      <div class="header-right">
        <button class="theme-toggle" data-action="theme-toggle">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="intro">Ile pytań chcesz rozwiązać?</div>
    <div class="quiz-setup">
      <div class="form-group">
        <label for="quiz-size">Liczba pytań (min. 10, max. ${maxQuestions}):</label>
        <select id="quiz-size">
          <option value="">Wybierz liczbę pytań...</option>
          ${optionsHtml}
          ${maxQuestions !== 100 ? `<option value="${maxQuestions}">Wszystkie (${maxQuestions})</option>` : ''}
        </select>
      </div>
    </div>
    <div class="actions">
      <button class="btn secondary" data-action="home">← Powrót</button>
    </div>
  `;
}

/* ==========================================================
   RENDER QUIZ
   ========================================================== */
function renderQuiz() {
  const currentQuestion = state.quizQuestions[state.quizCurrentQuestion];
  const progress = ((state.quizCurrentQuestion + 1) / state.quizQuestions.length) * 100;
  const answeredCorrectly = state.quizAnswers.slice(0, state.quizCurrentQuestion).reduce((sum, ans, idx) => {
    return sum + (ans === state.quizQuestions[idx].correctIndex ? 1 : 0);
  }, 0);

  const userAnswer = state.quizAnswers[state.quizCurrentQuestion];
  const isAnswered = userAnswer !== null && userAnswer !== undefined;
  const isCorrect = isAnswered && userAnswer === currentQuestion.correctIndex;

  const optionsHtml = currentQuestion.options.map((option, index) => {
    let className = 'answer-option';
    let disabled = '';
    let feedback = '';
    
    if (isAnswered) {
      disabled = 'disabled';
      if (index === currentQuestion.correctIndex) {
        className += ' correct';
        feedback = '✓ Poprawnie!';
      } else if (index === userAnswer) {
        className += ' incorrect';
        feedback = '✗ Błąd!';
      }
    }
    
    return `
      <button class="${className}" data-action="quiz-answer" data-value="${index}" ${disabled ? 'disabled' : ''}>
        <span class="option-letter">${String.fromCharCode(65 + index)})</span>
        <span class="option-text">${option}</span>
        ${feedback ? `<span class="option-feedback">${feedback}</span>` : ''}
      </button>
    `;
  }).join('');

  return `
    <div class="app-header">
      <div>
        <div class="app-title">Quiz <em>Hiszpański</em></div>
        <div class="app-subtitle">Poziom ${state.currentLevel}</div>
      </div>
      <div class="header-right">
        <button class="theme-toggle" data-action="theme-toggle">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
    
    <div class="practice-container">
      <div class="card-header">
        <div class="card-header-left">
          <span class="level-tag">Pytanie ${state.quizCurrentQuestion + 1}/${state.quizQuestions.length}</span>
          <span class="word-counter">✓ ${answeredCorrectly}</span>
        </div>
      </div>
      
      <div class="progress-bar-quiz">
        <div class="progress-fill-quiz" style="width: ${progress}%"></div>
      </div>
      
      <div class="quiz-question">
        <div class="question-number">Pytanie ${state.quizCurrentQuestion + 1}</div>
        <div class="question-text">Co oznacza <strong>"${currentQuestion.es}"</strong>?</div>
        <div class="speak-controls-quiz">
          <button class="speak-btn" id="quiz-speak-btn">🔊 Wysłuchaj wymowę</button>
        </div>
        ${isAnswered ? `<div class="quiz-feedback ${isCorrect ? 'correct' : 'incorrect'}">
          ${isCorrect ? '✓ Poprawna odpowiedź!' : '✗ Zła odpowiedź!'}
        </div>` : ''}
        <div class="answer-options">${optionsHtml}</div>
      </div>
    </div>
  `;
}

/* ==========================================================
   RENDER QUIZ RESULTS
   ========================================================== */
function renderQuizResults() {
  const total = state.quizQuestions.length;
  const correct = state.quizScore;
  const percentage = Math.round((correct / total) * 100);

  return `
    <div class="app-header">
      <div>
        <div class="app-title">Wyniki <em>Quizu</em></div>
        <div class="app-subtitle">Poziom ${state.currentLevel}</div>
      </div>
      <div class="header-right">
        <button class="theme-toggle" data-action="theme-toggle">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
    
    <div class="practice-container">
      <div class="quiz-results">
        <div class="results-title">Gratulacje! 🎉</div>
        <div class="results-score">${correct} / ${total} poprawnych (${percentage}%)</div>
        
        <div class="results-breakdown">
          <div class="result-stat">
            <div class="result-stat-value">${correct}</div>
            <div class="result-stat-label">Poprawnych</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-value">${total - correct}</div>
            <div class="result-stat-label">Błędnych</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-value">${percentage}%</div>
            <div class="result-stat-label">Wynik</div>
          </div>
        </div>
        
        <div class="actions">
          <button class="btn secondary" data-action="start-quiz" data-value="${state.currentLevel}">↻ Kolejny quiz</button>
          <button class="btn secondary" data-action="start-flashcards" data-value="${state.currentLevel}">📚 Flashcards</button>
          <button class="btn primary" data-action="home">Powrót do domu</button>
        </div>
      </div>
    </div>
  `;
}

/* ==========================================================
   MAIN RENDER
   ========================================================== */
function render() {
  let html = '';
  
  if (state.view === 'home') {
    html = renderHome();
  } else if (state.view === 'mode-selection') {
    html = renderModeSelection();
  } else if (state.view === 'practice' && state.currentMode === 'flashcards') {
    html = renderFlashcards();
  } else if (state.view === 'quiz-setup') {
    html = renderQuizSetup();
  } else if (state.view === 'quiz') {
    html = renderQuiz();
  } else if (state.view === 'quiz-results') {
    html = renderQuizResults();
  } else {
    html = renderHome();
  }
  
  document.getElementById('app').innerHTML = html;
}

/* ==========================================================
   EVENT HANDLERS
   ========================================================== */
document.addEventListener('click', (e) => {
  // Quiz speak button
  if (e.target.id === 'quiz-speak-btn') {
    if (state.view === 'quiz' && state.quizQuestions.length > 0) {
      const currentQuestion = state.quizQuestions[state.quizCurrentQuestion];
      speak(currentQuestion.es, { rate: 0.9, btn: e.target });
    }
    return;
  }

  const actionEl = e.target.closest('[data-action]');
  if (actionEl) {
    const action = actionEl.dataset.action;
    const value = actionEl.dataset.value;
    
    if (action === 'speak' && state.currentLevel && state.currentIdx != null) {
      const word = WORDS[state.currentLevel][state.currentIdx];
      speak(word.es, { rate: 0.9, btn: actionEl });
    } else {
      handleAction(action, value);
    }
    return;
  }

  const levelCard = e.target.closest('[data-level]');
  if (levelCard) {
    state.currentLevel = levelCard.dataset.level;
    state.view = 'mode-selection';
    render();
    return;
  }
});

document.addEventListener('change', (e) => {
  if (e.target.id === 'quiz-size') {
    const size = e.target.value;
    if (size && size !== '') {
      const numSize = parseInt(size);
      if (!isNaN(numSize) && numSize > 0) {
        handleAction('quiz-size-select', numSize);
      } else {
        console.error('Invalid quiz size selected:', size);
      }
    }
  }
});

render();
</script>

</body>
</html>
